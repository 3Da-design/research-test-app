services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    working_dir: /var/www/html
    volumes:
      - ../backend:/var/www/html
    command: >
      sh -lc "php artisan key:generate --force &&
      php artisan serve --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: >
      sh -lc "npm install &&
      npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    depends_on:
      - backend
