name: research-app-ci

on:
  push:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Prepare Laravel env
        run: |
          cp .env.example .env
          php artisan key:generate --force
      - name: Run Laravel tests
        # php artisan test 経由だと PHPUnit 12 への --log-junit 転送が失敗することがあるため phpunit を直接実行
        run: ./vendor/bin/phpunit --configuration phpunit.xml --log-junit junit.xml
      - name: Upload PHPUnit JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-phpunit-junit
          path: backend/junit.xml
          if-no-files-found: warn

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
